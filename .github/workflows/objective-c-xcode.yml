name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and analyse default scheme using xcodebuild command
    runs-on: macos-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select xcodeproj/xcworkspace
        id: proj
        shell: bash
        run: |
          set -euo pipefail
          if ls -1 *.xcworkspace >/dev/null 2>&1; then
            echo "filetype=workspace" >> "$GITHUB_OUTPUT"
            echo "file=$(ls -1 *.xcworkspace | head -n 1)" >> "$GITHUB_OUTPUT"
          else
            echo "filetype=project" >> "$GITHUB_OUTPUT"
            echo "file=$(ls -1 *.xcodeproj | head -n 1)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Default Scheme
        shell: bash
        run: |
          set -euo pipefail
          scheme_json="$(xcodebuild -list -json -"${{ steps.proj.outputs.filetype }}" "${{ steps.proj.outputs.file }}" 2>/dev/null | tr -d '\n')"
          if [ -z "$scheme_json" ]; then
            echo "xcodebuild -list -json returned empty output" >&2
            exit 1
          fi
          default="$(printf '%s' "$scheme_json" | ruby -e "require 'json'; puts JSON.parse(STDIN.read)['project']['targets'][0]")"
          printf '%s' "$default" > default
          echo "Using default scheme: $default"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          scheme="$(cat default)"
          xcodebuild clean build analyze \
            -scheme "$scheme" \
            -"${{ steps.proj.outputs.filetype }}" "${{ steps.proj.outputs.file }}" \
            | xcpretty
