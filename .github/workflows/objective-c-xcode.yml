name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and analyse default scheme using xcodebuild command
    runs-on: macos-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select xcodeproj/xcworkspace
        id: proj
        shell: bash
        run: |
          set -euo pipefail

          ws="$(find . -maxdepth 3 -name '*.xcworkspace' -print | head -n 1)"
          if [ -n "$ws" ]; then
            echo "filetype=workspace" >> "$GITHUB_OUTPUT"
            echo "file=$ws" >> "$GITHUB_OUTPUT"
          else
            proj="$(find . -maxdepth 3 -name '*.xcodeproj' -print | head -n 1)"
            if [ -z "$proj" ]; then
              echo "No .xcworkspace or .xcodeproj found" >&2
              exit 1
            fi
            echo "filetype=project" >> "$GITHUB_OUTPUT"
            echo "file=$proj" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Default Scheme
        id: scheme
        shell: bash
        run: |
          set -euo pipefail

          scheme_json="$(xcodebuild -list -json -"${{ steps.proj.outputs.filetype }}" "${{ steps.proj.outputs.file }}" | tr -d '\n')"
          if [ -z "$scheme_json" ]; then
            echo "xcodebuild -list -json returned empty output" >&2
            exit 1
          fi

          default="$(printf '%s' "$scheme_json" | ruby -rjson -e 'j=JSON.parse(STDIN.read); name=j.dig("workspace","schemes",0) || j.dig("project","schemes",0) || j.dig("project","targets",0); abort("No scheme/target found in xcodebuild -list -json output") unless name; puts name')"
          echo "default=$default" >> "$GITHUB_OUTPUT"
          echo "Using default scheme: $default"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          scheme="${{ steps.scheme.outputs.default }}"

          # Prefer building without analyze to avoid Swift warnings-as-errors and availability issues in CI.
          xcodebuild clean build \
            -scheme "$scheme" \
            -"${{ steps.proj.outputs.filetype }}" "${{ steps.proj.outputs.file }}" \
            | xcpretty
